<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yadav Store Hub</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header>
        <h1><i class="fas fa-store"></i> Yadav Store Hub</h1>
        <div class="header-controls">
            <div class="search-container">
                <input type="text" id="search-input" placeholder="Search your product, brand and more">
                <button id="search-btn"><i class="fas fa-search"></i></button>
            </div>
            <div class="header-buttons">
                <button id="account-btn" title="Account"><i class="fas fa-user"></i> Account</button>
                <button id="more-btn" title="More"><i class="fas fa-ellipsis-v"></i></button>
                <button id="cart-header-btn" title="Cart"><i class="fas fa-shopping-cart"></i> <span id="cart-count-header">0</span></button>
            </div>
        </div>
        <nav>
            <a href="#products"><i class="fas fa-boxes"></i> Products</a>
            <a href="#cart"><i class="fas fa-shopping-cart"></i> Cart (<span id="cart-count">0</span>)</a>
        </nav>
    </header>

    <main>
        <section id="products">
            <h2>Our Products</h2>
            <div id="product-list"></div>
        </section>

        <section id="cart" style="display: none;">
            <h2><i class="fas fa-shopping-cart"></i> Your Cart</h2>
            <div id="cart-items"></div>
            <p>Total: ₹<span id="cart-total">0</span></p>
            <button id="checkout-btn"><i class="fas fa-credit-card"></i> Checkout</button>
        </section>
    </main>

    <footer>
        <div class="footer-links">
            <a href="#about">About</a>
            <a href="#group-company">Group Company</a>
            <a href="#help">Help</a>
            <a href="#consumer-policy">Consumer Policy</a>
        </div>
        <div class="footer-about">
            <h3>About</h3>
            <a href="#contact-us">Contact Us</a>
            <a href="#about-us">About Us</a>
            <a href="#store-hub">Store Hub</a>
            <a href="#corporate-info">Corporate Information</a>
        </div>
    </footer>

    <script src="nitishjs1.js"></script>
</body>
</html>
